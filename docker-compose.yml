version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@crewai972.xyz"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - n8n_default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: im-system-backend
    ports:
      - "5656:5656"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 5656 --reload
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.im-backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.im-backend.entrypoints=web,websecure"
      - "traefik.http.routers.im-backend.tls=true"
      - "traefik.http.routers.im-backend.tls.certresolver=myresolver"
      - "traefik.http.services.im-backend.loadbalancer.server.port=5656"
      - "traefik.docker.network=n8n_default"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: im-system-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.im-frontend.rule=Host(`${FRONTEND_DOMAIN}`) || Host(`www.${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.im-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.im-frontend.tls=true"
      - "traefik.http.routers.im-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.im-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=n8n_default"

networks:
  n8n_default:
    external: true
