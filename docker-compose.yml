version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: im-system-backend
    ports:
      - "5656:5656"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 5656 --reload
    networks:
      - n8n_default
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.im-backend.rule=Host(`${BACKEND_DOMAIN}`)'
      - 'traefik.http.routers.im-backend.entrypoints=web,websecure'
      - 'traefik.http.routers.im-backend.tls=true'
      - 'traefik.http.routers.im-backend.tls.certresolver=myresolver'
      - 'traefik.http.services.im-backend.loadbalancer.server.port=5656'
      - 'traefik.docker.network=n8n_default'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: im-system-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - n8n_default
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.im-frontend.rule=Host(`${FRONTEND_DOMAIN}`) || Host(`www.${FRONTEND_DOMAIN}`)'
      - 'traefik.http.routers.im-frontend.entrypoints=web,websecure'
      - 'traefik.http.routers.im-frontend.tls=true'
      - 'traefik.http.routers.im-frontend.tls.certresolver=myresolver'
      - 'traefik.http.services.im-frontend.loadbalancer.server.port=3000'
      - 'traefik.docker.network=n8n_default'

  saas:
    build:
      context: ./saas_module
      dockerfile: Dockerfile
    container_name: im-system-saas
    ports:
      - "8501:8501"
    volumes:
      - ./saas_module:/app
      - ./saas_module/youtube_leads.db:/app/youtube_leads.db
    env_file:
      - .env.local
    networks:
      - n8n_default
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.im-saas.rule=Host(`saas.${FRONTEND_DOMAIN}`)'
      - 'traefik.http.routers.im-saas.entrypoints=web,websecure'
      - 'traefik.http.routers.im-saas.tls=true'
      - 'traefik.http.routers.im-saas.tls.certresolver=myresolver'
      - 'traefik.http.services.im-saas.loadbalancer.server.port=8501'
      - 'traefik.docker.network=n8n_default'

networks:
  n8n_default:
    external: true
