version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: im-system-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.env.local:/app/.env
      - ./backend/media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - web-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.im-backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.im-backend.entrypoints=web"
      - "traefik.http.services.im-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: im-system-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL}
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - web-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.im-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.im-frontend.entrypoints=web"
      - "traefik.http.services.im-frontend.loadbalancer.server.port=3000"

networks:
  web-network:
    external: true
    name: ${TRAEFIK_NETWORK}
